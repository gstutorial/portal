<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>G. S. Tutorial – Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
            background:radial-gradient(circle at top,#1e3a8a 0%,#0f172a 40%,#020617 100%);
            height:100%;width:100%;color:white;overflow:hidden;
        }
        /* ── LAYOUT ── */
        .app-shell{display:flex;flex-direction:column;height:100dvh;width:100%;overflow:hidden}
        /* ── MOBILE TOP HEADER ── */
        .top-bar{
            background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);
            border-bottom:1px solid rgba(255,255,255,0.09);
            padding:0 15px;display:flex;justify-content:space-between;align-items:center;
            flex-shrink:0;height:58px;z-index:90;
        }
        .top-bar-left{display:flex;align-items:center;gap:10px}
        .hamburger{background:none;border:none;color:white;cursor:pointer;padding:6px;display:flex;align-items:center;border-radius:8px;transition:.18s}
        .hamburger:hover{background:rgba(255,255,255,.08)}
        .brand{display:flex;align-items:center;gap:9px}
        .brand-logo{width:30px;height:30px;object-fit:contain;border-radius:6px}
        .brand-name{font-size:17px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        /* app-in-header state */
        .top-bar-app{display:none;align-items:center;gap:10px;flex:1}
        .back-pill{display:flex;align-items:center;gap:6px;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.3);color:#38bdf8;border-radius:10px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;transition:.18s}
        .back-pill:hover{background:rgba(56,189,248,.18)}
        .cur-app-info{display:flex;align-items:center;gap:7px;margin-left:auto}
        .cur-app-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center}
        .cur-app-name{font-size:14px;font-weight:700}
        /* ── BODY (sidebar + arena) ── */
        .body{display:flex;flex:1;overflow:hidden}
        /* ── SIDEBAR ── */
        .sidebar-mask{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:99;opacity:0;pointer-events:none;transition:opacity .28s}
        .sidebar-mask.open{opacity:1;pointer-events:auto}
        .sidebar{
            position:fixed;top:0;left:-290px;width:270px;height:100%;
            background:linear-gradient(160deg,#0f172a,#020617);
            border-right:1px solid rgba(255,255,255,.09);box-shadow:12px 0 30px rgba(0,0,0,.5);
            padding:28px 20px;display:flex;flex-direction:column;z-index:100;
            transition:left .3s cubic-bezier(.4,0,.2,1);
        }
        .sidebar.open{left:0}
        .sb-brand{display:none;flex-direction:column;align-items:center;gap:10px;margin-bottom:28px}
        .sb-brand img{width:65px;height:65px;object-fit:contain;border-radius:12px}
        .user-card{
            background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
            border-radius:16px;padding:14px;display:flex;gap:11px;align-items:flex-start;margin-bottom:28px;
        }
        .u-avatar{width:44px;height:44px;background:linear-gradient(135deg,#2563eb,#06b6d4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0}
        .u-info{flex:1;min-width:0}
        .u-name{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
        .u-un{font-size:11px;color:#38bdf8;font-family:monospace;margin-bottom:5px}
        .u-contact{font-size:10px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
        .role-pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:7px;font-weight:700;background:rgba(37,99,235,.25);color:#60a5fa;border:1px solid rgba(37,99,235,.4)}
        .role-pill.admin{background:rgba(220,38,38,.22);color:#f87171;border-color:rgba(220,38,38,.4)}
        .sb-bottom{margin-top:auto;display:flex;flex-direction:column;gap:12px}
        .logout-btn{
            background:rgba(239,68,68,.13);color:#f87171;border:1px solid rgba(239,68,68,.28);
            border-radius:12px;padding:11px;display:flex;align-items:center;justify-content:center;gap:8px;
            cursor:pointer;font-weight:700;font-size:13px;transition:.2s;
        }
        .logout-btn:hover{background:rgba(239,68,68,.85);color:white}
        .creator{text-align:center;font-size:11px;color:#334155;font-weight:600}
        /* ── MAIN ARENA ── */
        .main-arena{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px;-webkit-overflow-scrolling:touch}
        .main-arena::-webkit-scrollbar{width:4px}
        .main-arena::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:10px}
        .section-label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#64748b;margin-bottom:12px}
        .app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,290px),1fr));gap:14px;margin-bottom:30px}
        .app-card{
            background:linear-gradient(135deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
            border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:18px;
            cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:14px;
        }
        .app-card:hover{transform:translateY(-3px);background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15)}
        .app-card:active{transform:scale(.97)}
        .app-ico{width:50px;height:50px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
        .ic-blue{background:linear-gradient(135deg,#3b82f6,#2563eb)}
        .ic-green{background:linear-gradient(135deg,#10b981,#059669)}
        .ic-purple{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
        .ic-orange{background:linear-gradient(135deg,#f59e0b,#d97706)}
        .app-det{flex:1;min-width:0}
        .app-title{font-size:15px;font-weight:800;margin-bottom:4px}
        .app-desc{font-size:12px;color:#64748b;line-height:1.45;margin-bottom:8px}
        .perm-tags{display:flex;gap:5px;flex-wrap:wrap}
        .perm-tag{font-size:10px;padding:3px 7px;border-radius:6px;font-weight:700;background:rgba(255,255,255,.08);color:#94a3b8}
        /* ── DESKTOP BACK BUTTON ── */
        .desk-back{display:none;align-items:center;gap:9px;cursor:pointer;font-size:16px;font-weight:700;color:#38bdf8;margin-bottom:16px;padding:12px 16px;border-radius:12px;background:rgba(56,189,248,.05);border:1px solid rgba(56,189,248,.18);width:fit-content;transition:.18s}
        .desk-back:hover{background:rgba(56,189,248,.1)}
        /* ── IFRAME ── */
        #appViewer{display:none;border:none;background:transparent;flex-shrink:0}
        /* ── INSTALL FAB ── */
        .install-fab{position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;border-radius:50px;padding:13px 22px;font-size:14px;font-weight:800;box-shadow:0 5px 20px rgba(0,0,0,.4);cursor:pointer;z-index:1000;display:none;align-items:center;gap:8px}
        /* ── DESKTOP ── */
        @media(min-width:768px){
            .top-bar{display:none}
            .body{flex-direction:row}
            .sidebar-mask{display:none}
            .sidebar{position:relative;left:0;width:280px;height:100%;box-shadow:none;background:linear-gradient(160deg,rgba(255,255,255,.045),rgba(255,255,255,.01));backdrop-filter:blur(20px);transition:none}
            .sb-brand{display:flex}
            .main-arena{padding:28px}
            .app-card{flex-direction:column;gap:12px}
            .app-ico{width:58px;height:58px}
            .desk-back.visible{display:flex}
        }
    </style>
</head>
<body>
<div class="app-shell">

    <!-- MOBILE TOP BAR -->
    <header class="top-bar" id="topBar">
        <div class="top-bar-left" id="topBarDash">
            <button class="hamburger" onclick="toggleSidebar()">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="brand">
                <img src="logo.png" class="brand-logo" onerror="this.style.display='none'">
                <span class="brand-name">GS Portal</span>
            </div>
        </div>
        <div class="top-bar-app" id="topBarApp">
            <button class="back-pill" onclick="closeApp()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Dashboard
            </button>
            <div class="cur-app-info">
                <div class="cur-app-icon" id="curAppIcon"></div>
                <span class="cur-app-name" id="curAppName"></span>
            </div>
        </div>
    </header>

    <div class="body">
        <!-- SIDEBAR -->
        <div class="sidebar-mask" id="sidebarMask" onclick="toggleSidebar()"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sb-brand">
                <img src="logo.png" alt="GS Logo" onerror="this.style.display='none'">
                <span class="brand-name" style="font-size:20px">GS Portal</span>
            </div>
            <div class="user-card">
                <div class="u-avatar" id="uAvatar">U</div>
                <div class="u-info">
                    <div class="u-name" id="uName">Loading…</div>
                    <div class="u-un" id="uUsername">@—</div>
                    <div class="u-contact" id="uContact">—</div>
                    <span class="role-pill" id="uRole">User</span>
                </div>
            </div>
            <div class="sb-bottom">
                <button class="logout-btn" onclick="logout()">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Secure Logout
                </button>
                <div class="creator">Built by Gobind Sharma</div>
            </div>
        </aside>

        <!-- MAIN ARENA -->
        <main class="main-arena" id="mainArena">
            <div class="desk-back" id="deskBack" onclick="closeApp()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back to Dashboard
            </div>

            <div id="dashContent">
                <!-- Admin tools -->
                <div id="adminTools" style="display:none">
                    <div class="section-label">System Administration</div>
                    <div class="app-grid" id="adminGrid"></div>
                </div>
                <div class="section-label">Your Applications</div>
                <div class="app-grid" id="appGrid"></div>
            </div>

            <iframe id="appViewer" src="" allow="clipboard-write"></iframe>
        </main>
    </div>
</div>

<button class="install-fab" id="installFab">📲 Install App</button>

<script src="config.js"></script>
<script>
// ── PWA install ──
let deferredInstall;
const fab = document.getElementById('installFab');
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredInstall = e; fab.style.display = 'flex'; });
fab.onclick = () => { fab.style.display = 'none'; deferredInstall.prompt(); deferredInstall = null; };
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').then(r => r.update());

const API = GS_CONFIG.API_URL;

// ── APP DIRECTORY ──
const APPS = {
    'tuition-manager': {
        name: 'Tuition Manager',
        desc: 'Manage students, attendance, fees, and exams with PDF receipts.',
        ico: 'ic-blue',
        path: 'apps/tuition-manager/index.html',
        svg: `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>`
    },
    'mcq-assessment': {
        name: 'MCQ Quiz Maker',
        desc: 'Create and deliver multiple-choice quizzes for Class 9 & 10.',
        ico: 'ic-green',
        path: 'apps/mcq-assessment/index.html',
        svg: `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`
    }
};
const ADMIN_APPS = {
    'user-management': {
        name: 'User Management',
        desc: 'Create portal users, assign roles, reset passwords, and manage access.',
        ico: 'ic-purple',
        path: 'apps/user-management/index.html',
        svg: `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`
    }
};

// ── RENDER SIDEBAR ──
function renderSidebar() {
    const username = localStorage.getItem('gs_username') || '';
    const role     = localStorage.getItem('gs_role')     || 'User';
    const fullName = localStorage.getItem('gs_fullname') || username;
    const email    = localStorage.getItem('gs_email')    || '';
    const mobile   = localStorage.getItem('gs_mobile')   || '';
    document.getElementById('uName').innerText    = fullName;
    document.getElementById('uUsername').innerText = '@' + username;
    document.getElementById('uContact').innerText  = [email, mobile].filter(Boolean).join(' · ') || '—';
    document.getElementById('uAvatar').innerText   = fullName.charAt(0).toUpperCase();
    const rolePill = document.getElementById('uRole');
    rolePill.innerText = role;
    if (role === 'Admin') rolePill.classList.add('admin');
}

// ── BUILD DASHBOARD ──
function buildDashboard() {
    const role = localStorage.getItem('gs_role') || 'User';
    let access = {};
    try { access = JSON.parse(localStorage.getItem('gs_access') || '{}'); } catch(e) {}

    // Admin tools section
    if (role === 'Admin') {
        document.getElementById('adminTools').style.display = 'block';
        const ag = document.getElementById('adminGrid');
        ag.innerHTML = '';
        Object.entries(ADMIN_APPS).forEach(([id, app]) => ag.appendChild(mkCard(id, app, ['Full Access'])));
    }

    // App grid
    const grid = document.getElementById('appGrid');
    grid.innerHTML = '';
    if (role === 'Admin') {
        Object.entries(APPS).forEach(([id, app]) => grid.appendChild(mkCard(id, app, ['All Access'])));
    } else {
        const allowed = Object.keys(access).filter(k => APPS[k]);
        if (!allowed.length) {
            grid.innerHTML = '<div style="color:#64748b;font-size:14px">No applications assigned to your account.</div>';
        } else {
            allowed.forEach(id => grid.appendChild(mkCard(id, APPS[id], access[id] || ['View'])));
        }
    }
}

function mkCard(id, app, perms) {
    const card = document.createElement('div');
    card.className = 'app-card';
    card.onclick = () => openApp(id, app);
    card.innerHTML = `
        <div class="app-ico ${app.ico}">${app.svg}</div>
        <div class="app-det">
            <div class="app-title">${app.name}</div>
            <div class="app-desc">${app.desc}</div>
            <div class="perm-tags">${perms.map(p => `<span class="perm-tag">${p}</span>`).join('')}</div>
        </div>`;
    return card;
}

// ── OPEN / CLOSE APP ──
let currentAppId = null;
function openApp(id, app) {
    currentAppId = id;
    // Hide dashboard
    document.getElementById('dashContent').style.display = 'none';
    document.getElementById('deskBack').classList.add('visible');
    // Mobile header swap
    document.getElementById('topBarDash').style.display = 'none';
    document.getElementById('topBarApp').style.display  = 'flex';
    document.getElementById('curAppIcon').className = `cur-app-icon ${app.ico}`;
    document.getElementById('curAppIcon').innerHTML = app.svg;
    document.getElementById('curAppName').innerText = app.name;
    // Close sidebar
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarMask').classList.remove('open');
    // Iframe
    const arena  = document.getElementById('mainArena');
    const viewer = document.getElementById('appViewer');
    arena.style.cssText  = 'padding:0;overflow:hidden;flex:1;display:flex;flex-direction:column';
    viewer.style.display = 'block';
    viewer.style.flex    = '1';
    viewer.style.width   = '100%';
    viewer.style.height  = '100%';
    // On mobile we need explicit px height because some browsers ignore flex:1 on iframe
    function setH() {
        const barH = document.getElementById('topBar').offsetHeight || 0;
        viewer.style.height = (window.innerHeight - barH) + 'px';
    }
    setH();
    viewer.onload = () => {
        try { viewer.contentWindow.postMessage({ action: 'fixBottomNav' }, '*'); } catch(e) {}
    };
    viewer.src = `${app.path}?ts=${Date.now()}`;
}

function closeApp() {
    currentAppId = null;
    const viewer = document.getElementById('appViewer');
    viewer.src = '';
    viewer.style.display = 'none';
    document.getElementById('deskBack').classList.remove('visible');
    document.getElementById('topBarDash').style.display = 'flex';
    document.getElementById('topBarApp').style.display  = 'none';
    const arena = document.getElementById('mainArena');
    arena.style.cssText = '';
    document.getElementById('dashContent').style.display = 'block';
    // Silent refresh
    prefetch();
}

window.addEventListener('resize', () => {
    const viewer = document.getElementById('appViewer');
    if (viewer.style.display !== 'none') {
        const barH = document.getElementById('topBar').offsetHeight || 0;
        viewer.style.height = (window.innerHeight - barH) + 'px';
    }
});

// Listen for cache refresh requests from iframe apps
window.addEventListener('message', e => {
    if (e.data?.action === 'refreshCache') prefetch();
});

// ── SIDEBAR TOGGLE ──
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarMask').classList.toggle('open');
}

// ── PREFETCH (background data warm-up) ──
function prefetch() {
    const u = localStorage.getItem('gs_username');
    const t = localStorage.getItem('gs_token');
    const r = localStorage.getItem('gs_role');
    if (!u || !t) return;
    fetch(API, { method: 'POST', body: JSON.stringify({ action: 'get_students', username: u, token: t }) })
        .then(r => r.json()).then(d => { if (d.status === 'success') sessionStorage.setItem('gs_pref_students', JSON.stringify(d.students)); })
        .catch(() => {});
    if (r === 'Admin') {
        fetch(API, { method: 'POST', body: JSON.stringify({ action: 'get_users', adminUsername: u, adminToken: t }) })
            .then(r => r.json()).then(d => { if (d.status === 'success') sessionStorage.setItem('gs_pref_users', JSON.stringify(d.users)); })
            .catch(() => {});
    }
}

// ── LOGOUT ──
function logout() { localStorage.clear(); sessionStorage.clear(); window.location.href = 'index.html'; }

// ── INIT ──
window.onload = () => {
    const token    = localStorage.getItem('gs_token');
    const username = localStorage.getItem('gs_username');
    if (!token || !username) { window.location.href = 'index.html'; return; }
    renderSidebar();
    buildDashboard();
    prefetch();
};
</script>
</body>
</html>
